#### Publish on release or pre-release

name: 📦 Deploy to Docker rel
on:
  release:
    types:
      - released

jobs:
  deploy_docker_addon:
    name: 📦 Deploy to Docker add-on
    runs-on: ubuntu-latest
    environment: CI - release environment
    steps:
      - name: 📤 Checkout the repository
        uses: actions/checkout@main

      - name: ⏭️ Get next version
        id: version
        run: |
          latest=$(git describe --tags $(git rev-list --tags --max-count=1))
          echo Current version:    $latest
          echo "version=$latest" >> $GITHUB_OUTPUT

      - name: 📆 Set version number
        run: |
          echo setting source version:    ${{ steps.version.outputs.version }}
          sed -i '/    private const string Version = /c\    private const string Version = "${{ steps.version.outputs.version }}";' ${{github.workspace}}/src/Runtime/NetDaemon.Runtime/Internal/NetDaemonRuntime.cs
          sed -i '/    io.hass.version=/c\    io.hass.version="${{ steps.version.outputs.version }}"' ${{github.workspace}}/Dockerfile.AddOn

      - name: 📎 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: 🧰 Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      - name: 🔓 Login to Docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 🔓 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ Run Buildx
        run: |
          docker buildx build \
            --platform linux/arm64,linux/amd64 \
            --output "type=image,push=true" \
            --no-cache \
            --file ./Dockerfile.AddOn . \
            --compress \
            --tag netdaemon/netdaemon_addon6:${{ steps.version.outputs.version }} \
            --tag netdaemon/netdaemon_addon6:latest \
            --tag ghcr.io/net-daemon/netdaemon_addon6:${{ steps.version.outputs.version }} \
            --tag ghcr.io/net-daemon/netdaemon_addon6:latest

  deploy_docker:
    name: 📦 Deploy to Docker Hub
    runs-on: ubuntu-latest
    environment: CI - release environment
    steps:
      - name: 📤 Checkout the repository
        uses: actions/checkout@main
        with:
          fetch-depth: 0

      - name: ⏭️ Get next version
        id: version
        run: |
          latest=$(git describe --tags $(git rev-list --tags --max-count=1))
          echo Current version:    $latest
          echo "version=$latest" >> $GITHUB_OUTPUT

      - name: 📆 Set version number
        run: |
          echo setting source version:    ${{ steps.version.outputs.version }}
          sed -i '/    private const string Version = /c\    private const string Version = "${{ steps.version.outputs.version }}";' ${{github.workspace}}/src/Runtime/NetDaemon.Runtime/Internal/NetDaemonRuntime.cs
          sed -i '/    io.hass.version=/c\    io.hass.version="${{ steps.version.outputs.version }}"' ${{github.workspace}}/Dockerfile.AddOn

      - name: 📎 Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: 🔧 Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: 🧰 Available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}

      - name: 🔓 Login to Docker hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: 🔓 Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ Run Buildx
        run: |
          docker buildx build \
            --platform linux/arm64,linux/amd64 \
            --output "type=image,push=true" \
            --no-cache \
            --file ./Dockerfile . \
            --compress \
            --tag netdaemon/netdaemon6:latest \
            --tag netdaemon/netdaemon6:${{ steps.version.outputs.version }} \
            --tag ghcr.io/net-daemon/netdaemon6:${{ steps.version.outputs.version }} \
            --tag ghcr.io/net-daemon/netdaemon6:latest
